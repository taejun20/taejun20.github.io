<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Posts – Taejun Kim</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <style>
    :root {
      --accent:      #3b5bdb;
      --accent-soft: #e7ecff;
      --text-main:   #212529;
      --text-sub:    #495057;
      --text-muted:  #868e96;
      --bg:          #fcfdfe;
      --card-bg:     #ffffff;
      --border:      #dee2e6;
      --radius:      10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      font-size: 1rem;
      line-height: 1.7;
    }

    /* ─── Navbar ─────────────────────────────────────────── */
    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1rem;
    }
    .navbar-brand {
      font-weight: 500;
      font-size: 1.05rem;
      color: var(--text-main) !important;
      letter-spacing: -0.3px;
    }
    .navbar-brand:hover { color: var(--accent) !important; }
    .nav-link {
      font-weight: 500;
      font-size: 0.92rem;
      color: var(--text-sub) !important;
      padding: 0.4rem 0.75rem !important;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--accent) !important;
      background: var(--accent-soft);
    }
    .navbar-toggler { border: 1px solid var(--border); font-size: 0.85rem; }
    .navbar-toggler:focus { box-shadow: none; }

    /* ─── Page wrapper ────────────────────────────────────── */
    .page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* ─── Tag filter buttons ─────────────────────────────── */
    .tag-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .tag-btn {
      padding: 0.3rem 0.85rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-sub);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tag-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }
    .tag-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    /* ─── Post list ──────────────────────────────────────── */
    .post-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .post-entry {
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .post-entry:first-child { border-top: 1px solid var(--border); }
    .post-entry:hover .post-title { color: var(--accent); }

    .post-title-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .post-title {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--text-main);
      transition: color 0.15s;
    }
    .tag-chip {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 20px;
      padding: 0.1rem 0.55rem;
      white-space: nowrap;
    }
    .post-date {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    /* ─── Footer ──────────────────────────────────────────── */
    footer {
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding: 1.5rem 1rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

  <!-- ░░ NAVBAR ░░ -->
  <nav class="navbar navbar-expand-md sticky-top">
    <div class="container-fluid" style="max-width:860px;margin:0 auto;padding-left:1.25rem;padding-right:1.25rem;">
      <a class="navbar-brand" href="index.html">Taejun Kim</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu"
              aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <i class="bi bi-list" style="font-size:1.2rem;"></i>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="assets/CV_Taejun.pdf" target="_blank">CV</a></li>
          <li class="nav-item"><a class="nav-link" href="research.html">Research</a></li>
          <li class="nav-item"><a class="nav-link active" href="posts.html">Posts</a></li>
          <li class="nav-item"><a class="nav-link" href="vibe.html">Vibes</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ░░ MAIN ░░ -->
  <main class="page-wrap">

    <h1 style="text-align:center;font-weight:700;font-size:2rem;margin-bottom:1.5rem;">Posts</h1>

    <!-- Tag filters -->
    <div class="tag-filters">
      <button class="tag-btn active" data-tag="all" onclick="filterTag(this)">All</button>
      <button class="tag-btn" data-tag="Statistics" onclick="filterTag(this)">Statistics</button>
      <button class="tag-btn" data-tag="Electronics" onclick="filterTag(this)">Electronics</button>
      <button class="tag-btn" data-tag="3D Modeling" onclick="filterTag(this)">3D Modeling</button>
    </div>

    <!-- Post list -->
    <div class="post-list" id="post-list">

      <a class="post-entry" href="post.html?post=200903-interaction-effects-anova" data-tag="Statistics">
        <div class="post-title-row">
          <span class="post-title">Interaction Effects in ANOVA</span>
          <span class="tag-chip">Statistics</span>
        </div>
        <div class="post-date">Sep 3, 2020</div>
      </a>

    </div>

  </main>

  <footer>© 2026 Taejun Kim</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function filterTag(btn) {
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tag = btn.dataset.tag;
      document.querySelectorAll('.post-entry').forEach(entry => {
        entry.style.display = (tag === 'all' || entry.dataset.tag === tag) ? 'block' : 'none';
      });
    }
  </script>

</body>
</html>
