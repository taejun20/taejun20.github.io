<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibes – Taejun Kim</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <style>
    :root {
      --accent:      #a0693a;
      --accent-soft: #f5e8d8;
      --text-main:   #212529;
      --text-sub:    #495057;
      --text-muted:  #868e96;
      --bg:          #fffdf8;
      --card-bg:     #ffffff;
      --border:      #dee2e6;
      --radius:      10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      font-size: 1rem;
      line-height: 1.7;
    }

    /* ─── Page wrapper ────────────────────────────────────── */
    .page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* ─── Vibes links ────────────────────────────────────── */
    .vibe-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .vibe-links a {
      font-size: 1rem;
      color: var(--accent);
      text-decoration: none;
    }
    .vibe-links a:hover { text-decoration: underline; }

  </style>
</head>
<body>

  <!-- ░░ MAIN ░░ -->
  <main class="page-wrap">

    <h1 style="font-weight:700;font-size:2rem;margin-bottom:0.25rem;">Vibes</h1>
    <p style="color:var(--text-muted);font-size:0.92rem;margin-bottom:2.5rem;">By Taejun Kim</p>

    <div class="vibe-links">
      <a href="#">Book Reading.</a>
      <a href="#">Instrument Practice.</a>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
