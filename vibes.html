<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibes – Taejun Kim</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <style>
    :root {
      --accent:      #a0693a;
      --accent-soft: #f5e8d8;
      --text-main:   #212529;
      --text-sub:    #495057;
      --text-muted:  #868e96;
      --bg:          #fffdf8;
      --card-bg:     #ffffff;
      --border:      #dee2e6;
      --radius:      10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      font-size: 1rem;
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    main { flex: 1; width: 100%; }

    /* ─── Page wrapper ────────────────────────────────────── */
    .page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* ─── Vibes links ────────────────────────────────────── */
    .vibe-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .vibe-links a {
      font-size: 1rem;
      color: var(--accent);
      text-decoration: none;
    }
    .vibe-links a:hover { text-decoration: underline; }

  </style>
</head>
<body>

  <!-- ░░ MAIN ░░ -->
  <main class="page-wrap">

    <h1 style="font-weight:700;font-size:2rem;margin-bottom:0.25rem;">Vibes</h1>
    <p style="color:var(--text-muted);font-size:0.92rem;margin-bottom:2.5rem;">By Taejun Kim</p>

    <div class="vibe-links">
      <a href="/vibes/books">Books</a>
      <a href="/vibes/crossfit">Crossfit Journey</a>
    </div>

  </main>

  <footer style="text-align:center;font-size:0.82rem;color:var(--text-muted);border-top:1px solid var(--border);padding:0.5rem 1rem;margin-top:0;">
    <span style="display:inline-flex;align-items:center;gap:0.3rem;">
      <i class="bi bi-eye"></i>
      <span id="view-count">–</span>
    </span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment, setDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const app = initializeApp({
      apiKey: "AIzaSyB1maszVhThilw_EF_WUeQ1laeduJaMKdg",
      authDomain: "tj-website-seoul.firebaseapp.com",
      projectId: "tj-website-seoul",
      storageBucket: "tj-website-seoul.firebasestorage.app",
      messagingSenderId: "783490756168",
      appId: "1:783490756168:web:b6562e7b41593c07c9327d"
    });
    const db = getFirestore(app);
    const ref = doc(db, 'pages', 'vibes');
    try {
      const snap = await getDoc(ref);
      if (snap.exists()) {
        await updateDoc(ref, { views: increment(1) });
        document.getElementById('view-count').textContent = (snap.data().views || 0) + 1;
      } else {
        await setDoc(ref, { views: 1 });
        document.getElementById('view-count').textContent = 1;
      }
    } catch(e) { console.warn('Firestore error:', e); }
  </script>
</body>
</html>
