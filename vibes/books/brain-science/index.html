<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>멍청해지기 전에 읽는 뇌과학 (2025) – Taejun Kim</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <style>
    :root {
      --accent:      #3b5bdb;
      --accent-soft: #e7ecff;
      --text-main:   #212529;
      --text-sub:    #495057;
      --text-muted:  #868e96;
      --bg:          #fffdf8;
      --card-bg:     #ffffff;
      --border:      #dee2e6;
      --radius:      10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      font-size: 1rem;
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    main { flex: 1; }

    .page-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 5rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.88rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 2rem;
    }
    .back-link:hover { color: var(--accent); }

    .book-header {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }
    .book-cover {
      width: 65px;
      height: 91px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 3px 3px 12px rgba(0,0,0,0.15);
      cursor: pointer;
    }
    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .book-meta { padding-top: 0.3rem; }
    .book-title {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.2rem;
      color: var(--text-main);
    }
    .book-author {
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    .quote {
      border-left: 3px solid var(--border);
      padding: 0.5rem 0 0.5rem 1.2rem;
      margin-bottom: 1.5rem;
      color: var(--text-sub);
      font-size: 0.92rem;
      line-height: 1.75;
    }

    footer {
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding: 0.5rem 1rem;
    }
  </style>
</head>
<body>

  <main>
    <div class="page-wrap">
      <a class="back-link" href="/vibes/books"><i class="bi bi-arrow-left"></i> Books</a>

      <div class="book-header">
        <div class="book-cover" onclick="openLightbox()">
          <img src="/img/vibes/books/brain-science.jpg" alt="멍청해지기 전에 읽는 뇌과학 (2025)">
        </div>
        <div class="book-meta">
          <div class="book-title">멍청해지기 전에 읽는 뇌과학 (2025)</div>
          <div class="book-author">이인아</div>
        </div>
      </div>

      <div class="quote">
        Episodic memory 일화 기억<br>
        Procedural learning 절차적 학습<br>
        Declarative learning 서술적 학습<br>
        Hippocampus 해마<br>
        Striatum 선조체<br>
        Synaptic plasticity 시냅스 가소성<br>
        McGurk effect 맥거크 효과<br>
        Recognition and Recall 재인과 회상<br>
        Learning to learn 학습하는 법을 학습<br>
        런던 택시 운전사 뇌 연구 (2000)<br>
        Nun study 수녀 뇌 연구 (1986)
      </div>

    </div>
  </main>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center;cursor:pointer;">
    <span style="position:fixed;top:1.2rem;right:1.5rem;color:#fff;font-size:2rem;opacity:0.8;z-index:10000;">×</span>
    <img src="/img/vibes/books/brain-science.jpg" style="max-width:90vw;max-height:90vh;border-radius:10px;object-fit:contain;">
  </div>

  <footer>
    <span style="display:inline-flex;align-items:center;gap:0.3rem;">
      <i class="bi bi-eye"></i>
      <span id="view-count">–</span>
    </span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function openLightbox() { document.getElementById('lightbox').style.display='flex'; }
    function closeLightbox() { document.getElementById('lightbox').style.display='none'; }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment, setDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const app = initializeApp({
      apiKey: "AIzaSyB1maszVhThilw_EF_WUeQ1laeduJaMKdg",
      authDomain: "tj-website-seoul.firebaseapp.com",
      projectId: "tj-website-seoul",
      storageBucket: "tj-website-seoul.firebasestorage.app",
      messagingSenderId: "783490756168",
      appId: "1:783490756168:web:b6562e7b41593c07c9327d"
    });
    const db = getFirestore(app);
    const ref = doc(db, 'pages', 'books-brain-science');
    try {
      const snap = await getDoc(ref);
      if (snap.exists()) {
        await updateDoc(ref, { views: increment(1) });
        document.getElementById('view-count').textContent = (snap.data().views || 0) + 1;
      } else {
        await setDoc(ref, { views: 1 });
        document.getElementById('view-count').textContent = 1;
      }
    } catch(e) { console.warn('Firestore error:', e); }
  </script>

</body>
</html>
